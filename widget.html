<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Fanatics – Field Schedule</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>

<!-- TOPBAR — PROFESSIONAL DESIGN -->
<header class="topbar">
  
  <!-- Single Row: Search + Stats + Date Nav -->
  <div class="topbar-container">
    
    <!-- LEFT: Search -->
    <div class="topbar-search-wrapper">
      <div class="search-wrap">
        <svg class="search-ico" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input class="search-input" id="partner-search" type="text" placeholder="Search partner…" autocomplete="off"/>
        <button class="search-clear" id="search-clear" title="Clear">✕</button>
      </div>
    </div>

    <!-- CENTER: Stats Card -->
    <div class="topbar-stats">
      <div class="tstat">
        <div class="tstat-icon">📋</div>
        <div class="tstat-val" id="stat-today">—</div>
        <div class="tstat-label">Today</div>
      </div>
      <div class="tstat">
        <div class="tstat-icon">📅</div>
        <div class="tstat-val" id="stat-week">—</div>
        <div class="tstat-label">This Week</div>
      </div>
      <div class="tstat">
        <div class="tstat-icon">📆</div>
        <div class="tstat-val" id="stat-month">—</div>
        <div class="tstat-label">This Month</div>
      </div>
    </div>

    <!-- RIGHT: Date Navigation -->
   <div class="topbar-date-nav">
  
 <div style="display: flex; align-items: center; margin-right: 12px; background: #F1F5F9; border: 1px solid #CBD5E1; border-radius: 8px; padding: 0 12px; height: 36px; gap: 8px;">
  <span style="font-size: 12px; color: #475569;">🔍</span>
  <input type="range" id="zoom-slider" min="40" max="150" value="100" step="5" style="width: 80px; cursor: pointer;">
  <span id="zoom-label" style="font-size: 12px; font-weight: 700; color: #1A202C; width: 35px; text-align: right;">100%</span>
</div>

  <div class="date-nav">
    <button class="nav-arr" id="btn-prev">‹</button>
    <div class="date-btn" id="date-btn" style="position: relative; cursor: pointer;">
      <input type="text" id="calendar-picker" style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; bottom: 0; left: 50%;">
      
      <span class="cal-ico">📅</span>
      <div>
        <div class="db-day" id="db-day">—</div>
        <div class="db-date" id="db-date">—</div>
      </div>
    </div>
    <button class="nav-arr" id="btn-next">›</button>
  </div>
  <button class="today-btn" onclick="goToday()">Today</button>
</div>

</header>

<!-- FOOTER — status legend -->
<footer class="footer">
  <span class="footer-label">Status</span>
  <div class="leg"><div class="leg-dot" style="background:#10B981"></div>Confirmed</div>
  <div class="leg"><div class="leg-dot" style="background:#F59E0B"></div>Pending</div>
  <div class="leg"><div class="leg-dot" style="background:#EF4444"></div>Issue</div>
</footer>

<!-- BOARD -->
<div class="board-wrap" id="board-wrap">
  <div id="tables-container"></div>
</div>

<!-- TASK DRAWER -->
<div class="drawer-overlay" id="dov" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head">
      <div class="drawer-title" id="d-title"></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="d-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
